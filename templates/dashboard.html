<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .voice-btn {
            padding: 12px 20px;
            border: none;
            background: #6c63ff;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .voice-btn:hover {
            background: #5146d8;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="dashboard-container">

    <!-- NAVBAR -->
    <div class="navbar" style="display:flex; justify-content: space-between; align-items: center; padding: 10px;">
        <h2>Welcome, {{ username }}</h2>
        <div style="display:flex; gap:10px;">
            <a href="/leaderboard" class="logout-btn" style="background:#43e97b; text-decoration: none; padding: 10px; border-radius: 5px; color: black;">🏆 Leaderboard</a>
            <a href="/logout" class="logout-btn" style="text-decoration: none; padding: 10px; border-radius: 5px; background: #ff4b2b; color: white;">Logout</a>
        </div>
    </div>

    <!-- RESULT FORM -->
    <div class="glass-card">
        <h1>Student Result Calculator</h1>

        <form method="POST">
            <input type="text" name="subject" placeholder="Subject" required><br><br>
            <input type="number" name="obtained" placeholder="Obtained Marks" required><br><br>
            <input type="number" name="total" placeholder="Total Marks" required><br><br>
            <button type="submit">Save Result</button>
        </form>

        <!-- 🎙 VOICE ASSISTANT -->
        <button onclick="startAssistant()" class="voice-btn">
            🎙 Talk to AI Assistant
        </button>

        <p id="status"></p>
    </div>

    <!-- TABLE -->
    <div class="glass-card">
        <h2>Previous Results</h2>

        <table border="1" width="100%" style="border-collapse: collapse;">
            <thead>
                <tr style="background: #f4f4f4;">
                    <th>Subject</th>
                    <th>Marks</th>
                    <th>Percentage</th>
                    <th>Grade</th>
                </tr>
            </thead>
            <tbody>
                {% for item in results %}
                <tr>
                    <td>{{ item.subject }}</td>
                    <td>{{ item.obtained }}/{{ item.total }}</td>
                    <td>{{ item.percentage }}%</td>
                    <td>{{ item.grade }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<!-- ===================== VOICE AI SCRIPT ===================== -->
<script>
let recognition;

// =====================
// LOAD VOICES PROPERLY
// =====================
let voicesLoaded = [];

function loadVoices() {
    voicesLoaded = window.speechSynthesis.getVoices();
}

loadVoices();
window.speechSynthesis.onvoiceschanged = loadVoices;

// =====================
// SPEAK FUNCTION (FIXED)
// =====================
function speak(text) {
    if (!text) return;

    window.speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-IN";
    msg.rate = 1;
    msg.pitch = 1;

    // wait until voices are loaded
    if (voicesLoaded.length > 0) {
        msg.voice =
            voicesLoaded.find(v => v.lang.includes("en")) ||
            voicesLoaded[0];
    }

    window.speechSynthesis.speak(msg);
}

// =====================
// START ASSISTANT
// =====================
function startAssistant() {
    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Speech Recognition not supported in this browser");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "en-IN";
    recognition.interimResults = false;
    recognition.continuous = false;

    const status = document.getElementById("status");
    status.innerText = "Listening... 🎧";

    recognition.start();

    recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        status.innerText = "You said: " + text;

        const res = await fetch("/assistant", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text })
        });

        const data = await res.json();

        status.innerText = "AI: " + data.reply;

        // IMPORTANT: delay helps Chrome allow speech
        setTimeout(() => {
            speak(data.reply);
        }, 300);
    };

    recognition.onerror = (e) => {
        status.innerText = "Error: " + e.error;
    };
}
</script>

</body>
</html>
